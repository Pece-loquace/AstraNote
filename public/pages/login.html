<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AstraNote</title>
        <link rel="ico" href="../assets/img/favicon_io/favicon.ico">
    </head>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cyan: #00ffe7;
            --blue: #003cff;
            --dark: #05050f;
            --panel: rgba(5, 5, 20, 0.85);
            --glow-c: 0 0 8px #00ffe7, 0 0 20px #00ffe780, 0 0 50px #00ffe740;
            --glow-p: 0 0 8px #003cff, 0 0 20px #003cff80, 0 0 50px #003cff40;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                  linear-gradient(rgba(0, 255, 231, 0.07) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0, 255, 231, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridShift 20s linear infinite;
        }

        @keyframes gridShift {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 40px 40px;
            }
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.15) 2px, rgba(0, 0, 0, 0.15) 4px);
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            z-index: 0;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .orb1 {
            width: 420px;
            height: 420px;
            background: var(--blue);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        .orb1 {
            width: 300px;
            height: 300px;
            background: var(--blue);
            top: -80px;
            left: -80px;
            animation-delay: -3s;
        }

        .orb1 {
            width: 200px;
            height: 200px;
            background: var(--cyan);
            top: 40%;
            left: 60%;
            animation-delay: -6s;
        }

        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(20px, -25px) scale(1.05);
            }
        }

        .panel {
            position: relative;
            z-index: 10;
            width: 420px;
            padding: 48px 40px 44px;
        }
    </style>

    <script>

    </script>

    <body>
        <div class="grid-bg"></div>
        <div class="scanlines"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </body>
</html>
